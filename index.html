<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Un Pequeño Detalle</title>
    <style>
        /* --- ESTILOS GENERALES (Fondo y Página) --- */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            /* Fondo con degradado suave y romántico */
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            font-family: 'Courier New', Courier, monospace; /* Fuente estilo máquina de escribir, sutil */
            overflow: hidden; /* Para que no salgan barras de desplazamiento */
        }

        /* --- LA CAJITA MUSICAL (Contenedor Principal) --- */
        .music-box-container {
            width: 200px;
            height: 200px;
            position: relative;
            cursor: pointer;
            perspective: 1000px; /* Necesario para el efecto 3D de la tapa */
        }

        /* --- LA TAPA DE LA CAJA --- */
        .box-lid {
            width: 100%;
            height: 100%;
            background-color: #e0ac9a; /* Color madera suave / rosa palo */
            border: 4px solid #c08e7b;
            border-radius: 8px;
            position: absolute;
            top: 0;
            left: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            color: white;
            z-index: 10;
            transition: transform 1.2s ease-in-out, opacity 1s ease-in-out;
            transform-origin: top; /* La bisagra está arriba */
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        /* Texto sutil en la tapa */
        .box-lid::after {
            content: "Haz clic";
            font-size: 14px;
            opacity: 0.8;
        }

        /* --- EL INTERIOR DE LA CAJA --- */
        .box-body {
            width: 100%;
            height: 100%;
            background-color: #5d4037; /* Interior oscuro, como terciopelo o madera oscura */
            border-radius: 8px;
            position: absolute;
            bottom: 0;
            left: 0;
            z-index: 1;
            overflow: hidden; /* Para que el conejito no se vea antes de tiempo */
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5); /* Sombra interior para profundidad */
        }

        /* --- EL CONEJITO (Usando Emojis para sencillez, ¡pero muy tierno!) --- */
        .bunny-surprise {
            font-size: 100px; /* Tamaño del conejito */
            position: absolute;
            bottom: -110px; /* Empieza escondido debajo de la caja */
            left: 50%;
            transform: translateX(-50%);
            transition: bottom 1.5s ease-out 0.5s, transform 3s linear 1s infinite; /* Animación de subida y giro */
            z-index: 2;
        }

        /* El Ramo de Flores (también emoji) */
        .bunny-surprise::after {
            content: "💐";
            font-size: 40px;
            position: absolute;
            bottom: 20px;
            right: -10px;
        }

        /* --- ESTADOS DE LA ANIMACIÓN (Al abrirse) --- */

        /* 1. La Tapa se levanta */
        .music-box-container.open .box-lid {
            transform: rotateX(-110deg); /* Se abre hacia arriba y atrás */
            opacity: 0.3; /* Se vuelve un poco transparente */
        }

        /* 2. El Conejito sube */
        .music-box-container.open .bunny-surprise {
            bottom: 20px; /* Sube hasta estar dentro de la caja visible */
        }

        /* 3. El Conejito empieza a girar (como en las cajitas reales) */
        .music-box-container.open .bunny-surprise {
            animation: bunnySpin 3s linear infinite 2s; /* Empieza a girar después de subir */
        }

        /* Definición de la animación de giro */
        @keyframes bunnySpin {
            0% { transform: translateX(-50%) rotateY(0deg); }
            100% { transform: translateX(-50%) rotateY(360deg); }
        }

    </style>
</head>
<body>

    <div class="music-box-container" id="musicBox">
        
        <div class="box-lid"></div>
        
        <div class="box-body">
            <div class="bunny-surprise">
                🐰
            </div>
        </div>

    </div>

    <script>
        // Pequeño script para manejar el clic y activar la animación
        const musicBox = document.getElementById('musicBox');
        // const music = document.getElementById('music'); // Descomenta si usas audio

        musicBox.addEventListener('click', () => {
            // Añade o quita la clase 'open' al hacer clic
            musicBox.classList.toggle('open');
            
            // Si quieres añadir música, descomenta esto:
            /*
            if (musicBox.classList.contains('open')) {
                music.play();
            } else {
                music.pause();
                music.currentTime = 0; // Reinicia la canción
            }
            */
        });
    </script>

</body>
</html>
