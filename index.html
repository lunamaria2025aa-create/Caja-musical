<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caja de Música de Momentos</title>
    <style>
        :root {
            --sky-blue: #cde4f0;
            --box-blue: #a5cadc;
            --paper: #f9f7f0;
            --grass: #b7d5ac;
            --font-color: #708a96;
        }

        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: radial-gradient(circle, #ffffff, #e6eef2);
            font-family: 'Georgia', serif;
            perspective: 1500px;
        }

        /* --- LA ESTRUCTURA 3D --- */
        .scenery-container {
            width: 340px;
            height: 420px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 1.2s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }

        /* Tapa Frontal (Lo que se ve al inicio) */
        .lid {
            width: 100%;
            height: 100%;
            background: var(--box-blue);
            border-radius: 12px;
            position: absolute;
            z-index: 10;
            transform-origin: top;
            transition: transform 1.5s ease;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 15px 15px 40px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.3);
        }

        .lid h1 {
            color: white;
            font-size: 18px;
            letter-spacing: 2px;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.1);
            margin-bottom: 10px;
        }

        .lid-decoration {
            width: 60px;
            height: 2px;
            background: white;
            opacity: 0.6;
        }

        /* --- EL INTERIOR (DIORAMA) --- */
        .interior {
            width: 100%;
            height: 100%;
            background: var(--paper);
            border-radius: 12px;
            position: absolute;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.05);
            overflow: hidden;
            border: 8px solid white;
            box-sizing: border-box;
        }

        /* Capas de Fondo */
        .layer {
            position: absolute;
            bottom: 0;
            width: 100%;
            transition: transform 1.5s ease, opacity 1s ease;
            transform: translateY(50px);
            opacity: 0;
        }

        .forest-bg {
            height: 70%;
            background: linear-gradient(to top, #d0e4d2, transparent);
            z-index: 1;
        }

        .trees {
            height: 50%;
            background: url('https://www.transparenttextures.com/patterns/paper-fibers.png'), 
                        linear-gradient(to top, var(--grass), transparent);
            clip-path: polygon(0% 100%, 10% 70%, 20% 90%, 35% 60%, 50% 85%, 65% 55%, 80% 90%, 90% 75%, 100% 100%);
            z-index: 2;
        }

        /* Los Conejitos (Hechos con formas de CSS para que sean elegantes) */
        .bunnies-group {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%) scale(0.5);
            display: flex;
            gap: 30px;
            z-index: 5;
            transition: transform 1.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .bunny {
            width: 60px;
            height: 80px;
            background: white;
            border-radius: 50% 50% 40% 40%;
            position: relative;
            box-shadow: 5px 10px 20px rgba(0,0,0,0.05);
        }

        .bunny::before, .bunny::after { /* Orejas */
            content: '';
            position: absolute;
            top: -20px;
            width: 20px;
            height: 40px;
            background: white;
            border-radius: 50%;
        }
        .bunny::before { left: 5px; transform: rotate(-10deg); }
        .bunny::after { right: 5px; transform: rotate(10deg); }

        /* --- ANIMACIONES AL ABRIR --- */
        .scenery-container:hover .lid {
            transform: rotateX(110deg);
            opacity: 0;
            pointer-events: none;
        }

        .scenery-container:hover .layer {
            transform: translateY(0);
            opacity: 1;
        }

        .scenery-container:hover .bunnies-group {
            transform: translateX(-50%) scale(1);
        }

        /* Texto inferior estilo la imagen */
        .bottom-text {
            position: absolute;
            bottom: 15px;
            width: 100%;
            text-align: center;
            font-size: 12px;
            color: var(--font-color);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Botones decorativos */
        .btn-deco {
            position: absolute;
            bottom: 40px;
            right: 20px;
            display: flex;
            gap: 8px;
        }
        .circle {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--box-blue);
            box-shadow: inset 1px 1px 2px rgba(0,0,0,0.1);
        }

    </style>
</head>
<body>

    <div class="scenery-container">
        <div class="lid">
            <h1>MOMENTOS</h1>
            <div class="lid-decoration"></div>
        </div>

        <div class="interior">
            <div class="layer forest-bg"></div>
            <div class="layer trees"></div>
            
            <div class="bunnies-group">
                <div class="bunny"></div>
                <div class="bunny"></div>
            </div>

            <div class="bottom-text">Caja de música de momentos</div>
            
            <div class="btn-deco">
                <div class="circle"></div>
                <div class="circle"></div>
            </div>
        </div>
    </div>

</body>
</html>
