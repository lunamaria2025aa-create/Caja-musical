<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caja de Música de Momentos</title>
    <style>
        /* --- ESTILOS GENERALES Y ESTÉTICA DE PAPEL --- */
        :root {
            --bg-page: #e8f1f5; /* Fondo suave de la página */
            --box-main: #b8d9ea; /* Color de la caja de la imagen */
            --paper-cream: #fbf9f1; /* Interior crema */
            --vinyl-black: #1a1a1a;
            --vinyl-center: #88c0d0; /* Centro azul del disco */
            --shadow-soft: 5px 5px 15px rgba(0,0,0,0.1), -5px -5px 15px rgba(255,255,255,0.7);
            --shadow-inner: inset 2px 2px 5px rgba(0,0,0,0.15), inset -2px -2px 5px rgba(255,255,255,0.8);
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: var(--bg-page);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        /* --- CONTENEDOR PRINCIPAL DEL REPRODUCTOR --- */
        .player-container {
            width: 350px;
            height: 450px;
            background-color: var(--box-main);
            border-radius: 20px;
            box-shadow: var(--shadow-soft);
            position: relative;
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
            cursor: pointer;
            overflow: hidden; /* Para los corazones flotantes */
        }

        /* --- LA TAPA LEVANTADA (Con el disco trasero) --- */
        .lid-back {
            width: 90%;
            height: 40%;
            background-color: var(--paper-cream);
            border-radius: 15px;
            margin: 0 auto 20px auto;
            position: relative;
            box-shadow: var(--shadow-inner);
            overflow: hidden;
        }

        /* El medio disco de fondo */
        .rear-vinyl {
            width: 140px;
            height: 140px;
            background-color: var(--vinyl-black);
            border-radius: 50%;
            position: absolute;
            top: -70px; /* Medio escondido */
            left: 50%;
            transform: translateX(-50%);
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        
        .rear-vinyl-center {
            width: 50px;
            height: 50px;
            background-color: var(--vinyl-center);
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border: 2px solid rgba(255,255,255,0.5);
        }

        /* --- LA BASE CON EL DISCO PRINCIPAL --- */
        .base-plate {
            width: 100%;
            height: 55%;
            background-color: var(--paper-cream);
            border-radius: 15px;
            position: relative;
            box-shadow: var(--shadow-inner);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* El disco que gira */
        .main-vinyl {
            width: 180px;
            height: 180px;
            background-color: var(--vinyl-black);
            border-radius: 50%;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            position: relative;
            transition: transform 1s ease; /* Transición suave al empezar a girar */
        }
        
        /* Efecto de surcos del vinilo (opcional) */
        .main-vinyl::before {
            content: '';
            position: absolute;
            top: 5px; left: 5px; right: 5px; bottom: 5px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.05);
        }

        .main-vinyl-center {
            width: 60px;
            height: 60px;
            background-color: var(--vinyl-center);
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border: 3px solid rgba(255,255,255,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 30px; /* Tamaño de los conejitos emoji */
        }

        /* --- EL BRAZO DEL TOCADISCOS (Papercraft Style) --- */
        .tonearm-container {
            position: absolute;
            top: 10px;
            right: 20px;
            width: 30px;
            height: 150px;
            /* perspective: 1000px; /* Para efecto 3D si quisiéramos */
        }

        .tonearm-pivot {
            width: 20px;
            height: 20px;
            background-color: #d1d1d1;
            border-radius: 50%;
            position: absolute;
            top: 0; left: 50%;
            transform: translateX(-50%);
            box-shadow: var(--shadow-soft);
        }

        .tonearm-body {
            width: 8px;
            height: 120px;
            background-color: #f1f1f1; /* Brazo blanco */
            position: absolute;
            top: 15px; left: 50%;
            transform: translateX(-50%);
            border-radius: 4px;
            box-shadow: var(--shadow-soft);
            transition: transform 1s ease-in-out; /* Animación clave */
            transform-origin: top center; /* Gira desde la base */
            transform: rotate(-25deg); /* Posición inicial: LEVANTADO */
        }
        
        /* La aguja/cabezal */
        .tonearm-head {
            width: 16px;
            height: 25px;
            background-color: #f1f1f1;
            position: absolute;
            bottom: -5px; left: 50%;
            transform: translateX(-50%) rotate(10deg);
            border-radius: 3px;
            box-shadow: var(--shadow-soft);
        }

        /* --- BOTONES DE CONTROL (Simples círculos neomórficos) --- */
        .controls {
            position: absolute;
            bottom: 10px;
            right: 20px;
            display: flex;
            gap: 10px;
        }
        
        .control-btn {
            width: 15px;
            height: 15px;
            background-color: var(--vinyl-center);
            border-radius: 50%;
            box-shadow: var(--shadow-soft);
        }

        /* --- ESTADOS DE ANIMACIÓN --- */

        /* 1. Cuando se activa ('playing'), el brazo BAJA */
        .player-container.playing .tonearm-body {
            transform: rotate(10deg); /* Baja hasta el disco */
        }

        /* 2. Cuando está sonando, el disco GIRA */
        .player-container.playing .main-vinyl {
            animation: vinylSpin 5s linear infinite 1s; /* Empieza 1s después, para que baje el brazo */
        }

        @keyframes vinylSpin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* --- TEXTO DEL TÍTULO (Papercraft Style) --- */
        .title-text {
            position: absolute;
            bottom: 15px;
            left: 20px;
            font-size: 14px;
            color: #555;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* --- MENSAJE SUTIL AL FINAL --- */
        .secret-message {
            position: absolute;
            bottom: -50px; /* Escondido */
            left: 50%;
            transform: translateX(-50%);
            background-color: white;
            padding: 10px 20px;
            border-radius: 10px;
            box-shadow: var(--shadow-soft);
            transition: bottom 1s ease-out 2s; /* Aparece lento después de que baje el brazo */
            font-size: 14px;
            color: #333;
            z-index: 10;
        }

        .player-container.playing .secret-message {
            bottom: 60px; /* Sube y aparece */
        }

        /* --- CORAZONES FLOTANTES --- */
        .heart {
            position: absolute;
            color: rgba(255, 100, 100, 0.6);
            font-size: 20px;
            opacity: 0;
            z-index: 5;
        }

        .player-container.playing .heart {
            animation: heartFloat 3s ease-out infinite;
        }

        @keyframes heartFloat {
            0% { transform: translateY(0) scale(1); opacity: 0; }
            20% { opacity: 1; }
            100% { transform: translateY(-100px) scale(1.5) rotate(20deg); opacity: 0; }
        }

    </style>
</head>
<body>

    <div class="player-container" id="player">
        
        <div class="lid-back">
            <div class="rear-vinyl">
                <div class="rear-vinyl-center"></div>
            </div>
        </div>
        
        <div class="base-plate">
            <div class="main-vinyl">
                <div class="main-vinyl-center">
                    👩‍❤️‍👨 </div>
            </div>

            <div class="tonearm-container">
                <div class="tonearm-pivot"></div>
                <div class="tonearm-body">
                    <div class="tonearm-head"></div>
                </div>
            </div>

            <div class="controls">
                <div class="control-btn"></div>
                <div class="control-btn"></div>
            </div>
            <div class="title-text">Caja de Momentos</div>
        </div>

        <div class="secret-message">
            Esta canción me recordó a ti... ✨
        </div>

        <div class="heart" style="top: 60%; left: 20%; animation-delay: 0s;">❤️</div>
        <div class="heart" style="top: 55%; left: 75%; animation-delay: 1s;">💖</div>
        <div class="heart" style="top: 70%; left: 45%; animation-delay: 2s;">💕</div>

    </div>

    <script>
        const player = document.getElementById('player');

        // Al hacer clic en cualquier parte de la caja...
        player.addEventListener('click', () => {
            // Alterna la clase 'playing', que activa todas las animaciones CSS
            player.classList.toggle('playing');
        });
    </script>

</body>
</html>
