<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atrapa el Deseo ✨</title>
    <style>
        /* --- ESTILOS GENERALES Y FONDO LOFI --- */
        :root {
            --bg-top: #ffafbd; /* Rosa pastel */
            --bg-bottom: #ffc3a0; /* Naranja pastel suave */
            --bunny-color: #ffffff;
            --basket-color: #d1b48c; /* Color mimbre */
            --star-color: #fffacd; /* Amarillo suave */
            --text-color: #5d4037;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* Evita barras de desplazamiento */
            background: linear-gradient(135deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- CONTENEDOR DEL JUEGO --- */
        #game-container {
            width: 100%;
            height: 100%;
            position: relative;
            cursor: none; /* Oculta el cursor para usar el personaje */
        }

        /* --- EL PERSONAJE (Conejito Simple con CSS) --- */
        #player {
            width: 60px;
            height: 80px;
            position: absolute;
            bottom: 20px;
            left: 50%; /* Empieza en el centro */
            transform: translateX(-50%);
            transition: left 0.1s ease-out; /* Movimiento suave */
            z-index: 10;
        }

        /* Cuerpo del conejito */
        .bunny-body {
            width: 50px;
            height: 60px;
            background-color: var(--bunny-color);
            border-radius: 50% 50% 40% 40%;
            position: absolute;
            bottom: 0;
            left: 5px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        
        /* Orejas */
        .bunny-ear {
            width: 15px;
            height: 35px;
            background-color: var(--bunny-color);
            border-radius: 50%;
            position: absolute;
            top: -20px;
        }
        .bunny-ear.left { left: 10px; transform: rotate(-10deg); }
        .bunny-ear.right { right: 10px; transform: rotate(10deg); }

        /* La Canasta */
        .basket {
            width: 40px;
            height: 25px;
            background-color: var(--basket-color);
            border-radius: 0 0 15px 15px;
            position: absolute;
            bottom: 10px;
            left: 10px;
            box-shadow: inset 0 -2px 5px rgba(0,0,0,0.2);
            z-index: 11;
        }

        /* --- LAS ESTRELLAS (Lo que cae) --- */
        .star {
            width: 20px;
            height: 20px;
            background-color: var(--star-color);
            border-radius: 50%;
            position: absolute;
            box-shadow: 0 0 10px var(--star-color);
            opacity: 0.8;
            z-index: 5;
        }

        /* --- CONTADOR Y MENSAJES --- */
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: var(--text-color);
            font-size: 18px;
            font-weight: bold;
            text-shadow: 1px 1px 2px rgba(255,255,255,0.5);
            z-index: 20;
        }

        #final-message {
            display: none; /* Escondido al principio */
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: white;
            padding: 20px 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
            color: var(--text-color);
            font-size: 20px;
            z-index: 100;
        }

    </style>
</head>
<body>

    <div id="game-container">
        
        <div id="ui">Estrellas: <span id="score">0</span> / 10</div>
        
        <div id="player">
            <div class="bunny-ear left"></div>
            <div class="bunny-ear right"></div>
            <div class="bunny-body"></div>
            <div class="basket"></div>
        </div>

        <div id="final-message">
            <h2>¡Lo logramos! ✨</h2>
            <p>Hicimos un buen equipo, gracias por ayudarme.</p>
        </div>

    </div>

    <script>
        const gameContainer = document.getElementById('game-container');
        const player = document.getElementById('player');
        const scoreElement = document.getElementById('score');
        const finalMessage = document.getElementById('final-message');

        let score = 0;
        const targetScore = 10;
        let gameActive = true;

        // --- MOVIMIENTO DEL PERSONAJE ---
        gameContainer.addEventListener('mousemove', (e) => {
            if (!gameActive) return;
            // Mueve el personaje a la posición del ratón
            let x = e.clientX;
            // Limita el movimiento dentro de la pantalla
            if (x < 30) x = 30;
            if (x > window.innerWidth - 30) x = window.innerWidth - 30;
            
            player.style.left = x + 'px';
        });

        // Para móviles (touch)
        gameContainer.addEventListener('touchmove', (e) => {
            if (!gameActive) return;
            let x = e.touches[0].clientX;
            if (x < 30) x = 30;
            if (x > window.innerWidth - 30) x = window.innerWidth - 30;
            player.style.left = x + 'px';
        });


        // --- CREACIÓN Y CAÍDA DE ESTRELLAS ---
        function createStar() {
            if (!gameActive) return;

            const star = document.createElement('div');
            star.classList.add('star');
            
            // Posición inicial aleatoria arriba
            star.style.left = Math.random() * (window.innerWidth - 20) + 'px';
            star.style.top = '-20px';
            
            gameContainer.appendChild(star);
            
            // Velocidad de caída aleatoria
            let speed = Math.random() * 2 + 2; // Entre 2 y 4px por frame
            
            function fall() {
                if (!gameActive) {
                    star.remove();
                    return;
                }

                let top = parseFloat(star.style.top);
                top += speed;
                star.style.top = top + 'px';
                
                // --- DETECCIÓN DE COLISIÓN (Atrapar la estrella) ---
                const playerRect = player.getBoundingClientRect();
                const starRect = star.getBoundingClientRect();
                
                if (
                    starRect.bottom > playerRect.top &&
                    starRect.top < playerRect.bottom &&
                    starRect.right > playerRect.left &&
                    starRect.left < playerRect.right
                ) {
                    // ¡Atrapada!
                    score++;
                    scoreElement.innerText = score;
                    star.remove();
                    
                    // Comprueba si ganó
                    if (score >= targetScore) {
                        endGame();
                    }
                    return; // Detiene la caída
                }
                
                // Si la estrella se cae por abajo, se elimina
                if (top > window.innerHeight) {
                    star.remove();
                } else {
                    requestAnimationFrame(fall); // Sigue cayendo
                }
            }
            requestAnimationFrame(fall);
        }

        // Crea una estrella cada cierto tiempo
        let starInterval = setInterval(createStar, 800); // Una cada 0.8s


        // --- FINAL DEL JUEGO ---
        function endGame() {
            gameActive = false;
            clearInterval(starInterval);
            finalMessage.style.display = 'block';
            player.style.cursor = 'default';
        }

    </script>

</body>
</html>
